apply plugin: "java"

version = "1.0"

sourceCompatibility = JavaVersion.VERSION_1_8
targetCompatibility = JavaVersion.VERSION_1_8

repositories {
    mavenCentral()
    maven { url "https://www.jitpack.io" }
}

dependencies {
    compileOnly "com.github.Anuken.Mindustry:core:v158.1"
    compileOnly "com.github.Anuken.Arc:arc-core:v158.1"
}

jar {
    archiveName = "Compact-Machines.jar"
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}

task setupDecompile {
    doLast {
        println "Mindustry mod build configured for version 158.1"
    }
}

build.dependsOn setupDecompile
